<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing - xcey IFS Consulting</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #003366;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #003366;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            color: #FF6600;
        }
        .pricing-card {
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            padding: 20px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .pricing-card h2 {
            color: #003366;
        }
        .pricing-card button {
            background-color: #FF6600;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
        }
        .footer {
            background-color: #003366;
            color: #ffffff;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>xcey IFS Consulting</h1>
        <p>Your IFS ERP Partner in North America</p>
    </header>
    <div class="container">
        <h1>Pricing</h1>
        <div class="pricing-card">
            <h2>Basic Plan</h2>
            <p>9/month</p>
            <ul>
                <li>Feature 1</li>
                <li>Feature 2</li>
            </ul>
            <button>Contact Us</button>
        </div>
        <div class="pricing-card">
            <h2>Pro Plan</h2>
            <p>99/month</p>
            <ul>
                <li>Feature 1</li>
                <li>Feature 2</li>
                <li>Feature 3</li>
            </ul>
            <button>Contact Us</button>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2026 xcey IFS Consulting. All rights reserved.</p>
    </div>
</body>
</html>
