<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Horizontal Pricing</title>
    <style>
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin: 2rem 0;
        }
        .pricing-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .pricing-card h3 {
            color: #1e3a8a;
            margin-bottom: 1rem;
        }
        .btn {
            background: #1e3a8a;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="pricing-grid">
        <div class="pricing-card">
            <h3>Post-Go-Live Support</h3>
            <p>Comprehensive ongoing support package</p>
            <a href="#" class="btn">Contact Us</a>
        </div>
        <div class="pricing-card">
            <h3>System Stabilization</h3>
            <p>Targeted system optimization</p>
            <a href="#" class="btn">Contact Us</a>
        </div>
        <div class="pricing-card">
            <h3>Micro-Services</h3>
            <p>Task-based solutions under 8 hours</p>
            <a href="#" class="btn">Contact Us</a>
        </div>
    </div>
</body>
</html>
